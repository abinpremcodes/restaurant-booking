{% extends 'base.html' %}

{% block title %}Book a Table{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🍽️ Book a Table at {{ restaurant.name }}</h3>
                
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">📅 Date:</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">⏰ Time Slot:</label>
                        <select name="timeslot" class="form-control">
                            {% for timeslot in timeslots %}
                                <option value="{{ timeslot.pk }}">{{ timeslot.time }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">👥 Number of Guests:</label>
                        <input type="number" name="guests" class="form-control" min="1" required>
                    </div>
    {% endblock %}
