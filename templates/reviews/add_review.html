{% extends 'base.html' %}

{% block title %}Write a Review{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">✍️ Write a Review for {{ restaurant.name }}</h3>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">⭐ Rating:</label>
                        <select name="rating" class="form-control">
                            <option value="1">1 ⭐</option>
                            <option value="2">2 ⭐⭐</option>
                            <option value="3">3 ⭐⭐⭐</option>
                            <option value="4">4 ⭐⭐⭐⭐</option>
                            <option value="5">5 ⭐⭐⭐⭐⭐</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">💬 Comment:</label>
                        <textarea name="comment" class="form-control" rows="4"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-danger w-100">Submit Review</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{% url 'restaurant_detail' restaurant.pk %}">← Back to Restaurant</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
