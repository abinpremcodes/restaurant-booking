<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Restaurant Booking{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f3ee;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d) !important;
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #f0a500 !important;
        }
        .nav-link {
            color: #ffffff !important;
            font-weight: 500;
            margin: 0 5px;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: #f0a500 !important;
        }
        .btn-primary {
            background-color: #f0a500;
            border-color: #f0a500;
            color: white;
            border-radius: 25px;
            padding: 8px 25px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background-color: #d4920a;
            border-color: #d4920a;
        }
        .btn-danger {
            background-color: #c0392b;
            border-color: #c0392b;
            border-radius: 25px;
            padding: 8px 25px;
            font-weight: 500;
        }
        .btn-danger:hover {
            background-color: #a93226;
            border-color: #a93226;
        }
        .card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🍽️ DineEasy</a>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'booking_list' %}">My Bookings</a>
                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
                <a class="nav-link" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center py-4 mt-5" style="background: #1a1a1a; color: #aaa;">
    <p class="mb-0">🍽️ DineEasy — Find & Book the Best Restaurants</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
